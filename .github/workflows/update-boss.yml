name: Weekly BOSS Update

on:
  schedule:
    # 每周日凌晨 01:30 北京时间 (UTC 17:30 周六)
    - cron: '30 17 * * 6'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate README
        run: node generate-readme.js

      - name: Commit and Push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update weekly BOSS schedule $(date +'%Y-%m-%d')"
          git push

      - name: Sync to Gitee
        if: ${{ secrets.GITEE_USERNAME != '' && secrets.GITEE_TOKEN != '' }}
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/${{ secrets.GITEE_USERNAME }}
          static_list: ${{ github.event.repository.name }}:${{ secrets.GITEE_REPO_NAME || github.event.repository.name }}
          force_update: true
          debug: true
          auth_type: token
          auth_token: ${{ secrets.GITHUB_TOKEN }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          account_type: user
